<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gradient-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient-book1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient-book2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 书本底座 -->
  <rect x="8" y="44" width="48" height="8" rx="2" fill="rgba(255,255,255,0.05)"/>
  
  <!-- 第一本书 -->
  <rect x="14" y="20" width="16" height="28" rx="3" fill="url(#gradient-book1)"/>
  <rect x="16" y="26" width="10" height="2" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="16" y="30" width="8" height="2" rx="1" fill="rgba(255,255,255,0.2)"/>
  
  <!-- 第二本书 -->
  <rect x="26" y="16" width="16" height="32" rx="3" fill="url(#gradient-book2)"/>
  <rect x="28" y="24" width="10" height="2" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="28" y="28" width="12" height="2" rx="1" fill="rgba(255,255,255,0.2)"/>
  <rect x="28" y="32" width="9" height="2" rx="1" fill="rgba(255,255,255,0.15)"/>
  
  <!-- 第三本书 -->
  <rect x="38" y="22" width="14" height="26" rx="3" fill="url(#gradient-book1)"/>
  <rect x="40" y="30" width="8" height="2" rx="1" fill="rgba(255,255,255,0.3)"/>
  <rect x="40" y="34" width="10" height="2" rx="1" fill="rgba(255,255,255,0.2)"/>
