<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gradient-purple" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient-pink" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient-teal" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 底座 -->
  <rect x="8" y="52" width="48" height="4" rx="2" fill="rgba(255,255,255,0.05)"/>
  
  <!-- 柱形图 -->
  <rect x="14" y="34" width="10" height="18" rx="2" fill="url(#gradient-purple)"/>
  <rect x="27" y="22" width="10" height="30" rx="2" fill="url(#gradient-pink)"/>
  <rect x="40" y="40" width="10" height="12" rx="2" fill="url(#gradient-teal)"/>
  
  <!-- 顶部装饰点 -->
  <circle cx="19" cy="32" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="32" cy="20" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="45" cy="38" r="2" fill="rgba(255,255,255,0.5)"/>
</svg>