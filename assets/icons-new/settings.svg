<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gradient-settings" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 齿轮主体 -->
  <g fill="rgba(148, 163, 184, 0.2)" stroke="url(#gradient-settings)" stroke-width="2">
    <polygon points="32,8 36,16 44,18 40,26 44,32 40,38 44,46 36,48 32,56 28,48 20,46 24,38 20,32 24,26 20,18 28,16"/>
  </g>
  
  <!-- 内圈 -->
  <circle cx="32" cy="32" r="10" fill="rgba(15, 15, 25, 0.8)" 
          stroke="url(#gradient-settings)" stroke-width="2"/>
  
  <!-- 中心圆点 -->
  <circle cx="32" cy="32" r="4" fill="url(#gradient-settings)"/>
